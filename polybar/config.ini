# Modules
[module/space]
type = custom/text
format = <label>
label = "  "

[module/terminal]
type = custom/text
format = <label>
label = "%{T1}"
click-left = alacritty &

[module/browser]
type = custom/text
format = <label>
label = "%{T1}"
click-left = firefox &

[module/email]
type = custom/text
format = <label>
label = "%{T1}"
click-left = thunderbird &

[module/ksnip]
type = custom/text
format = <label>
label = "%{T1}󱣵"
click-left = ksnip &

[module/repos]
type = custom/text
format = <label>
label = "%{T1}󰘬"
click-left = alacritty -e bash -c 'cd ~/Repositories && exec $SHELL' &

[module/downloads]
type = custom/text
format = <label>
label = "%{T1}"
click-left = alacritty -e bash -c 'cd ~/Downloads && exec $SHELL' &

[module/grep]
type = custom/text
format = <label>
label = "%{T1}%{T2} %{T1}"
click-left = xdotool type "grep -r \"<search>\" ."

[module/sed]
type = custom/text
format = <label>
label = "%{T1}%{T2} %{T1}󰛔"
click-left = xdotool type "find . -type f -exec sed -i 's/<search>/<replacement>/g' {} \;"

[module/commit]
type = custom/text
format = <label>
label = "%{T1}%{T2} %{T1}"
click-left = xdotool type "git add .; git commit -m \"<message>\"; git push origin HEAD"

[module/zip]
type = custom/text
format = <label>
label = "%{T1}%{T2} %{T1}"
click-left = xdotool type "zip -r \"<result.zip>\" ."

[module/settings]
type = custom/text
format = <label>
label = "%{T1}"
click-left = alacritty -e bash -c 'cd ~/.config && exec $SHELL' &

[module/bashrc]
type = custom/text
format = <label>
label = "%{T1}"
click-left = alacritty -e bash -c 'nvim ~/.bashrc; exec bash' &

[module/prev]
type = custom/text
format = <label>
label = "%{T5}%{T1} "
click-left = /home/admin/.config/polybar/music/client.py prev

[module/start]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py isStopped
click-left = /home/admin/.config/polybar/music/client.py start
interval = 1

[module/pause]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py isPaused
click-left = /home/admin/.config/polybar/music/client.py pause
interval = 1

[module/next]
type = custom/text
format = <label>
label = "%{T5}%{T1} "
click-left = /home/admin/.config/polybar/music/client.py next

[module/song]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py songName
interval = 1

[module/progress]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py progress
interval = 1

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/i3]
type = internal/i3
index-sort = true

format = <label-state>

label-focused = %index%
label-focused-foreground = ${colors.white}
label-focused-background = ${colors.active}
label-focused-underline = ${colors.secondary}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-background = ${colors.inactivebg}
label-unfocused-underline = ${colors.inactive}
label-unfocused-padding = 2

label-visible = %index%
label-visible-background = ${colors.inactivebg}
label-visible-underline = ${colors.inactive}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.inactivebg}
label-urgent-underline = ${colors.inactive}
label-urgent-padding = 2

label-separator = "%{T4} %{T1}"
label-separator-padding = 0

[module/audio]
type = custom/script
exec = /home/admin/.config/polybar/audio/current_profile.sh
interval = 1
click-left = /home/admin/.config/polybar/audio/switch_profiles.sh

[module/speakers]
type = internal/pulseaudio
sink = alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Speaker__sink

format-volume-prefix = " %{T3}󰕾%{T-}"
format-volume-prefix-foreground = ${colors.secondary}

format-volume = <label-volume> <ramp-volume> 

label-volume = "%{T8} %{T7} %{T-}  "
label-volume-foreground = ${colors.grey}

ramp-volume-0 = " %{O-77}%{T7}%{F#36454F}%{T-}%{F-}  "
ramp-volume-1 = " %{O-77}%{T7}%{T-}"
ramp-volume-2 = " %{O-77}%{T7}%{T-}"
ramp-volume-3 = " %{O-77}%{T7}%{T-}"
ramp-volume-4 = " %{O-77}%{T7}%{T-}"
ramp-volume-5 = " %{O-77}%{T7}%{T-}"

label-muted = " %{T3}󰖁"
label-muted-foreground = ${colors.secondary}

[module/headphones]
type = internal/pulseaudio
sink = alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Headphones__sink

format-volume-prefix = " %{T3}󰋋%{T-}"
format-volume-prefix-foreground = ${colors.secondary}

format-volume = <label-volume> <ramp-volume> 

label-volume = "%{T8} %{T7} %{T-} "
label-volume-foreground = ${colors.grey}

ramp-volume-0 = "  %{O-77}%{T7}%{F#36454F}%{T-}%{F-}"
ramp-volume-1 = "  %{O-77}%{T7}%{T-} "
ramp-volume-2 = "  %{O-77}%{T7}%{T-} "
ramp-volume-3 = "  %{O-77}%{T7}%{T-} "
ramp-volume-4 = "  %{O-77}%{T7}%{T-} "
ramp-volume-5 = "  %{O-77}%{T7}%{T-} "
ramp-volume-6 = "  %{O-77}%{T7}%{T-} "
ramp-volume-7 = "  %{O-77}%{T7}%{T-} "
ramp-volume-8 = "  %{O-77}%{T7}%{T-} "
ramp-volume-9 = "  %{O-77}%{T7}%{T-} "
ramp-volume-10 = "  %{O-77}%{T7}%{T-} "

label-muted = " %{T3}󰟎%{T1} "
label-muted-foreground = ${colors.secondary}

[module/xkeyboard]
type = custom/script
exec = echo "%{F#763A9C}%{T6}%{F-}%{T1} %{T4}$(setxkbmap -query | grep layout | awk '{print $2}')"
tail = true
interval = 1
click-left = /home/admin/.config/polybar/keyboard/toggle_keyboard_layout.sh

[module/battery]
type = internal/battery
full-at = 95

format-charging = <animation-charging>
format-discharging = <ramp-capacity>
format-full = " %{T7}%{F-}"

animation-charging-0 = " %{T7}%{F-}"
animation-charging-1 = " %{T7}%{F-}"
animation-charging-2 = " %{T7}%{F-}"
animation-charging-3 = " %{T7}%{F-}"
animation-charging-4 = " %{T7}%{F-}"
animation-charging-framerate = 1000

ramp-capacity-0 = " %{T7}%{F-}"
ramp-capacity-1 = " %{T7}%{F-}"
ramp-capacity-2 = " %{T7}%{F-}"
ramp-capacity-3 = " %{T7}%{F-}"
ramp-capacity-4 = " %{T7}%{F-}"

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected> <ramp-signal>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected = " %{A1:alacritty -e nmtui &:}%{T7}%{A}"
label-connected-foreground = ${colors.grey}

ramp-signal-0 = "%{O-33}%{T7}"
ramp-signal-1 = "%{O-33}%{T7}"
ramp-signal-2 = "%{O-33}%{T7}"
ramp-signal-3 = "%{O-33}%{T7}"
ramp-signal-4 = "%{O-33}%{T7}"
ramp-signal-5 = "%{O-33}%{T7}"
ramp-signal-6 = "%{O-33}%{T7}"
ramp-signal-7 = "%{O-33}%{T7}"

label-disconnected = "%{A1:alacritty -e nmtui &:}  %{T3}%{A}"
label-disconnected-foreground = ${colors.red}

[module/eth]
inherit = network-base
interface-type = wired

label-connected = "%{A1:alacritty -e nmtui &:}  %{T3}󰩩%{A} "

label-disconnected = "%{A1:alacritty -e nmtui &:}  %{T3}󱖣%{A} "
label-disconnected-foreground = ${colors.red}

[module/bluetooth]
type = custom/text
label = " %{T7}󰂰%{T1} "
label-foreground = ${colors.blue}
click-left = blueberry &

[module/memory]
type = internal/memory
interval = 2
format-prefix = "%{T3}%{T1} "
format-prefix-foreground = ${colors.secondary}
label = "%percentage_used:2%% "

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "%{T3}%{T1} "
format-prefix-foreground = ${colors.secondary}
label = "%percentage:2%%"

[module/date]
type = internal/date
interval = 1
date = " %{T3}%{F#763A9C}%{F-}%{T4} %{T1}%Y-%m-%d %{T3}%{F#763A9C} %{F-}%{T1}%{O-10}%I:%M%{T4} %{T1}%p"
label = %date%

[module/shutdown]
type = custom/text
format = <label>
label = "%{T3}󰐥%{T4} "
click-left = poweroff

[module/restart]
type = custom/text
format = <label>
label = " %{T5}󰜉%{T4}"
click-left = reboot
; vim:ft=dosini
