[colors]
background = #4D000000
backgroundtop = #2DFFFFFF
transparent = #00000000
foreground = #FFFFFF
primary = #399A9C
secondary = #763A9C
active = #6FFFFFFF
inactive = #4DC5C8C6
inactivebg = #4DFFFFFF
alert = #A54242
disabled = #C5C8C6
blue= #0082FC
white= #FFFFFF
grey = #4DFFFFFF
red = #FF0000

[bar/top0]
monitor = ${env:MONITOR}
top = true
override-redirect = true
wm-restack = i3
width = 80%
height = 20pt
offset-x = 10%
offset-y = 5pt
radius = 15pt
line-size = 3pt
background = ${colors.backgroundtop}
font-0 = "Hack Nerd Font Mono:size=14;3"
font-1 = "Hack Nerd Font Mono:size=25;3"
font-2 = "Hack Nerd Font Mono:size=20;4"
font-3 = "Hack Nerd Font Mono:size=7;1"
font-4 = "Hack Nerd Font Mono:size=20;4"
font-5 = "Hack Nerd Font Mono:size=10;1"
modules-left = space i3 virtualdesktop
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[bar/top1]
monitor = ${env:MONITOR}
top = true
override-redirect = true
wm-restack = i3
width = 40%
height = 20pt
offset-x = 0.5%
offset-y = 5pt
radius = 15pt
line-size = 3pt
background = ${colors.backgroundtop}
font-0 = "Hack Nerd Font Mono:size=14;3"
font-1 = "Hack Nerd Font Mono:size=25;3"
font-2 = "Hack Nerd Font Mono:size=20;4"
font-3 = "Hack Nerd Font Mono:size=7;1"
font-4 = "Hack Nerd Font Mono:size=20;4"
font-5 = "Hack Nerd Font Mono:size=10;1"
modules-left = space i3 virtualdesktop
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[bar/top2]
monitor = ${env:MONITOR}
top = true
override-redirect = true
wm-restack = i3
width = 32%
height = 20pt
offset-x = 44%
offset-y = 5pt
radius = 15pt
background = ${colors.backgroundtop}
font-0 = "Hack Nerd Font Mono:size=14;3"
font-1 = "Hack Nerd Font Mono:size=25;3"
font-2 = "Hack Nerd Font Mono:size=20;4"
font-3 = "Hack Nerd Font Mono:size=7;1"
font-4 = "Hack Nerd Font Mono:size=20;4"
font-5 = "Hack Nerd Font Mono:size=10;1"
fixed-center = true
modules-center = prev start pause next song progress
cursor-click = pointer
cursor-scroll = ns-resize

[bar/top3]
monitor = ${env:MONITOR}
top = true
override-redirect = true
wm-restack = i3
width = 20%
height = 20pt
offset-x = 79.5%
offset-y = 5pt
radius = 15pt
background = ${colors.backgroundtop}
font-0 = "Hack Nerd Font Mono:size=14;3"
font-1 = "Hack Nerd Font Mono:size=25;3"
font-2 = "Hack Nerd Font Mono:size=20;4"
font-3 = "Hack Nerd Font Mono:size=7;1"
font-4 = "Hack Nerd Font Mono:size=20;4"
font-5 = "Hack Nerd Font Mono:size=10;1"
fixed-center = true
modules-center = shutdown sleep hibernate restart memory cpu
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[bar/bottom0]
monitor = ${env:MONITOR}
bottom = true
override-redirect = true
wm-restack = i3
width = 80%
height = 30pt
offset-x = 10%
offset-y = 5pt
radius = 15pt
background = ${colors.backgroundtop}
font-0 = "Hack Nerd Font Mono:size=20;0"
font-1 = "Hack Nerd Font Mono:size=50;12"
font-2 = "Hack Nerd Font Mono:size=30;7.5"
font-3 = "Hack Nerd Font Mono:size=20;5"
font-4 = "Hack Nerd Font Mono:size=15;3"
font-5 = "Hack Nerd Font Mono:size=36;9"
font-6 = "Font Awesome 6 Pro Solid:size=20;5"
font-7 = "Font Awesome 6 Pro Solid:size=10;5"
modules-center = audio speakers headphones xkeyboard battery wlan eth bluetooth date
cursor-click = pointer
cursor-scroll = ns-resize

[bar/bottom1]
monitor = ${env:MONITOR}
bottom = true
override-redirect = true
wm-restack = i3
width = 45%
height = 30pt
offset-x = 25%
offset-y = 5pt
radius = 20pt
background = ${colors.backgroundtop}
font-0 = "Hack Nerd Font Mono:size=20;0"
font-1 = "Hack Nerd Font Mono:size=50;12"
font-2 = "Hack Nerd Font Mono:size=30;7.5"
font-3 = "Hack Nerd Font Mono:size=20;5"
font-4 = "Hack Nerd Font Mono:size=15;3"
font-5 = "Hack Nerd Font Mono:size=36;9"
font-6 = "Font Awesome 6 Pro Solid:size=20;5"
font-7 = "Font Awesome 6 Pro Solid:size=10;5"
modules-center = audio speakers headphones xkeyboard battery wlan eth bluetooth date
cursor-click = pointer
cursor-scroll = ns-resize

# Modules
[module/space]
type = custom/text
format = <label>
label = "  "

[module/prev]
type = custom/text
format = <label>
label = "%{T5}%{T1} "
click-left = /home/admin/.config/polybar/music/client.py prev

[module/start]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py isStopped
click-left = /home/admin/.config/polybar/music/client.py start
interval = 1

[module/pause]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py isPaused
click-left = /home/admin/.config/polybar/music/client.py pause
interval = 1

[module/next]
type = custom/text
format = <label>
label = "%{T5}%{T1} "
click-left = /home/admin/.config/polybar/music/client.py next

[module/song]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py songName
interval = 1

[module/progress]
type = custom/script
exec = /home/admin/.config/polybar/music/client.py progress
interval = 1

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/i3]
type = internal/i3
index-sort = true

format = <label-state>

label-focused = %index%
label-focused-foreground = ${colors.white}
label-focused-background = ${colors.active}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-background = ${colors.inactivebg}
label-unfocused-underline = ${colors.inactive}
label-unfocused-padding = 2

label-visible = %index%
label-visible-background = ${colors.inactivebg}
label-visible-underline = ${colors.inactive}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.inactivebg}
label-urgent-underline = ${colors.inactive}
label-urgent-padding = 2

label-separator = "%{T4} %{T1}"
label-separator-padding = 0

[module/shutdown]
type = custom/text
format = <label>
label = " %{T3}󰐥%{T1} "
click-left = poweroff

[module/sleep]
type = custom/text
format = <label>
label = " %{T3}󰤄%{T1} "
click-left = systemctl suspend

[module/hibernate]
type = custom/text
format = <label>
label = " %{T3}%{T1} "
click-left = systemctl hybrid-sleep

[module/restart]
type = custom/text
format = <label>
label = " %{T3}󰜉%{T1}  "
click-left = reboot

[module/audio]
type = custom/script
exec = /home/admin/.config/polybar/audio/current_profile.sh
interval = 1
click-left = /home/admin/.config/polybar/audio/switch_profiles.sh
label-foreground = ${colors.primary}

[module/speakers]
type = internal/pulseaudio
sink = alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Speaker__sink

format-volume-prefix = " %{T3}󰕾%{T-}"
format-volume-prefix-foreground = ${colors.secondary}

format-volume = <label-volume> <ramp-volume> 

label-volume = "%{T8} %{T7}%{T-} "
label-volume-foreground = ${colors.grey}

ramp-volume-0 = " %{O-81}%{T7}%{F#36454F}%{T-}%{F-}  "
ramp-volume-1 = " %{O-81}%{T7}%{T-}"
ramp-volume-2 = " %{O-81}%{T7}%{T-}"
ramp-volume-3 = " %{O-81}%{T7}%{T-}"
ramp-volume-4 = " %{O-81}%{T7}%{T-}"
ramp-volume-5 = " %{O-81}%{T7}%{T-}"

label-muted = " %{T3}󰖁"
label-muted-foreground = ${colors.secondary}

[module/headphones]
type = internal/pulseaudio
sink = alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Headphones__sink

format-volume-prefix = " %{T3}󰋋%{T-}"
format-volume-prefix-foreground = ${colors.secondary}

format-volume = <label-volume> <ramp-volume> 

label-volume = "%{T8} %{T7}%{T-}"
label-volume-foreground = ${colors.grey}

ramp-volume-0 = "  %{O-81}%{T7}%{F#36454F}%{T-}%{F-}"
ramp-volume-1 = "  %{O-81}%{T7}%{T-} "
ramp-volume-2 = "  %{O-81}%{T7}%{T-} "
ramp-volume-3 = "  %{O-81}%{T7}%{T-} "
ramp-volume-4 = "  %{O-81}%{T7}%{T-} "
ramp-volume-5 = "  %{O-81}%{T7}%{T-} "
ramp-volume-6 = "  %{O-81}%{T7}%{T-} "
ramp-volume-7 = "  %{O-81}%{T7}%{T-} "
ramp-volume-8 = "  %{O-81}%{T7}%{T-} "
ramp-volume-9 = "  %{O-81}%{T7}%{T-} "
ramp-volume-10 = "  %{O-81}%{T7}%{T-} "

label-muted = " %{T3}󰟎%{T1} "
label-muted-foreground = ${colors.secondary}

[module/xkeyboard]
type = custom/script
exec = echo "%{T6}%{F#399A9C}%{F-}%{T1} %{T4}$(setxkbmap -query | grep layout | awk '{print $2}')"
tail = true
interval = 1
click-left = /home/admin/.config/polybar/keyboard/toggle_keyboard_layout.sh

[module/battery]
type = internal/battery
full-at = 95

format-charging = <animation-charging>
format-discharging = <ramp-capacity>
format-full = " %{T7}%{F-}"

animation-charging-0 = " %{T7}%{F-}"
animation-charging-1 = " %{T7}%{F-}"
animation-charging-2 = " %{T7}%{F-}"
animation-charging-3 = " %{T7}%{F-}"
animation-charging-4 = " %{T7}%{F-}"
animation-charging-framerate = 1000

ramp-capacity-0 = " %{T7}%{F-}"
ramp-capacity-1 = " %{T7}%{F-}"
ramp-capacity-2 = " %{T7}%{F-}"
ramp-capacity-3 = " %{T7}%{F-}"
ramp-capacity-4 = " %{T7}%{F-}"

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = "%percentage_used:2%% "

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = "%percentage:2%% "

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected> <ramp-signal>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected = " %{A1:alacritty -e nmtui &:}%{T7}%{A}"
label-connected-foreground = ${colors.grey}

ramp-signal-0 = "%{O-43}%{T7}"
ramp-signal-1 = "%{O-43}%{T7}"
ramp-signal-2 = "%{O-43}%{T7}"
ramp-signal-3 = "%{O-43}%{T7}"
ramp-signal-4 = "%{O-43}%{T7}"
ramp-signal-5 = "%{O-43}%{T7}"
ramp-signal-6 = "%{O-43}%{T7}"
ramp-signal-7 = "%{O-43}%{T7}"

label-disconnected = "%{A1:alacritty -e nmtui &:}  %{T3}%{A}"
label-disconnected-foreground = ${colors.red}

[module/eth]
inherit = network-base
interface-type = wired

label-connected = "%{A1:alacritty -e nmtui &:}  %{T3}󰩩%{A} "

label-disconnected = "%{A1:alacritty -e nmtui &:}  %{T3}󱖣%{A} "
label-disconnected-foreground = ${colors.red}

[module/bluetooth]
type = custom/text
label = " %{T3}󰂰%{T1} "
label-foreground = ${colors.blue}
click-left = blueberry &

[module/date]
type = internal/date
interval = 1

date = "%{T5}%a, %b %d, %Y %I:%M %p  "

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
